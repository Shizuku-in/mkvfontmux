name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        shell: pwsh
        run: dotnet build .\MkvFontMux.slnx -c Release

  publish_packages:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86]
        mode: [scd, fdd]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish and Prepare Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $rid = "${{ matrix.rid }}"
          $mode = "${{ matrix.mode }}"
          $consoleTemp = ".\publish-temp\console"
          $guiTemp = ".\publish-temp\gui"
          $consoleZip = ".\mkvfontmux-console-$version-$rid-$mode.zip"
          $guiZip = ".\mkvfontmux-gui-$version-$rid-$mode.zip"
          
          $isScd = if ($mode -eq 'scd') { "true" } else { "false" }

          if (Test-Path $consoleTemp) { Remove-Item $consoleTemp -Recurse -Force }
          if (Test-Path $guiTemp) { Remove-Item $guiTemp -Recurse -Force }
          if (Test-Path $consoleZip) { Remove-Item $consoleZip -Force }
          if (Test-Path $guiZip) { Remove-Item $guiZip -Force }

          dotnet publish .\MkvFontMux.Console\MkvFontMux.Console.csproj `
            -c Release -r $rid --self-contained $isScd `
            /p:PublishSingleFile=true /p:PublishTrimmed=false `
            -o $consoleTemp

          dotnet publish .\MkvFontMux.Gui\MkvFontMux.Gui.csproj `
            -c Release -r $rid --self-contained $isScd `
            /p:PublishSingleFile=true /p:PublishTrimmed=false `
            -o $guiTemp

          foreach ($app in @("console", "gui")) {
            if (Test-Path "./README.md") { Copy-Item "./README.md" ".\publish-temp\$app\README.md" -Force }
            if (Test-Path "./LICENSE") { Copy-Item "./LICENSE" ".\publish-temp\$app\LICENSE" -Force }
          }

          @"
          # MkvFontMux default settings
          # Use ';' to separate multiple directories.
          mkvmerge-bin=
          font-directory=
          pyftsubset-bin=
          "@ | Set-Content ".\publish-temp\console\config.ini" -Encoding UTF8

          Compress-Archive -Path ".\publish-temp\console\*" -DestinationPath $consoleZip
          Compress-Archive -Path ".\publish-temp\gui\*" -DestinationPath $guiZip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.mode }}-${{ matrix.rid }}
          path: ./*.zip
          retention-days: 1

  create_release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: publish_packages
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true